<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Nutrition Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { display: flex; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
    <script>
        function toggleAll(btn) {
            const card = btn.closest('.day-card');
            const boxes = card.querySelectorAll('input[type=checkbox]');
            const allChecked = [...boxes].every(b => b.checked);
            boxes.forEach(b => b.checked = !allChecked);
            btn.textContent = allChecked ? 'All' : 'None';
        }

        async function detectCountry() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async ({ coords }) => {
                try {
                    const res = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?lat=${coords.latitude}&lon=${coords.longitude}&format=json`,
                        { headers: { 'Accept-Language': 'en' } }
                    );
                    const data = await res.json();
                    const code = data?.address?.country_code?.toUpperCase();
                    if (code) document.getElementById('countryCode').value = code;
                } catch (_) {}
            }, () => {});
        }

        document.addEventListener('DOMContentLoaded', detectCountry);
    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

<nav class="bg-slate-800 px-6 py-4">
    <span class="text-xl font-bold text-white">AI Nutrition Planner</span>
    <span class="ml-3 text-xs text-slate-400 italic">powered by <span th:utext="${aiModel}" /></span>
</nav>

<main class="max-w-5xl mx-auto py-8 px-4 space-y-6">

    <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">

        <form hx-post="/plan" hx-target="#result" hx-swap="innerHTML" hx-indicator="#spinner" class="space-y-6">

            <!-- Days & Meals -->
            <div>
                <h2 class="text-sm font-semibold text-gray-700 mb-3">Days &amp; Meals</h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2">

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Monday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="monday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="monday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="monday" value="DINNER"/> Dinner</label>
                    </div>

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Tuesday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="tuesday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="tuesday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="tuesday" value="DINNER"/> Dinner</label>
                    </div>

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Wednesday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="wednesday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="wednesday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="wednesday" value="DINNER"/> Dinner</label>
                    </div>

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Thursday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="thursday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="thursday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="thursday" value="DINNER"/> Dinner</label>
                    </div>

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Friday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="friday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="friday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="friday" value="DINNER"/> Dinner</label>
                    </div>

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Saturday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="saturday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="saturday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="saturday" value="DINNER"/> Dinner</label>
                    </div>

                    <div class="day-card border border-gray-200 rounded p-3 bg-gray-50">
                        <div class="flex items-center justify-between mb-2">
                            <p class="font-semibold text-gray-700 text-xs">Sunday</p>
                            <button type="button" onclick="toggleAll(this)" class="text-xs text-blue-600 hover:underline">All</button>
                        </div>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="sunday" value="BREAKFAST"/> Breakfast</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600 mb-1"><input type="checkbox" name="sunday" value="LUNCH"/> Lunch</label>
                        <label class="flex items-center gap-1 text-xs text-gray-600"><input type="checkbox" name="sunday" value="DINNER"/> Dinner</label>
                    </div>

                </div>
            </div>

            <!-- Options row -->
            <div class="flex flex-wrap items-end gap-4 border-t border-gray-100 pt-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1" for="countryCode">Country (ISO code)</label>
                    <input id="countryCode" name="countryCode" type="text" maxlength="2"
                           class="border border-gray-300 rounded px-3 py-1.5 text-sm w-20 focus:outline-none focus:ring-1 focus:ring-slate-500"
                           placeholder="DE"/>
                </div>
                <div class="flex-1 min-w-48">
                    <label class="block text-xs font-medium text-gray-600 mb-1" for="additionalInstructions">Additional instructions</label>
                    <input id="additionalInstructions" name="additionalInstructions" type="text"
                           class="border border-gray-300 rounded px-3 py-1.5 text-sm w-full focus:outline-none focus:ring-1 focus:ring-slate-500"
                           placeholder="e.g. Prefer quick recipes under 30 minutes."/>
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit"
                            class="border border-gray-400 bg-white hover:bg-gray-50 text-gray-800 font-medium px-5 py-1.5 rounded text-sm transition-colors">
                        Generate Plan
                    </button>
                    <div id="spinner" class="htmx-indicator items-center gap-2 text-sm text-gray-500">
                        <svg class="spinner w-4 h-4 text-slate-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                        Generating…
                    </div>
                </div>
            </div>

        </form>

        <!-- Result area populated by HTMX -->
        <div id="result" class="mt-6"></div>

    </div>

</main>
</body>
</html>
