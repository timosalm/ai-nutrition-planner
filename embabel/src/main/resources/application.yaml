spring:
  application.name: nutrition-planner
  security.user:
      password: 123456
      name: alice
  ai.chat.client.observations:
      log-completion: true
embabel:
  models.default-llm: gpt-5-nano
  agent.platform.llm-operations.prompts.default-timeout: 120s
  observability.service-name: ${spring.application.name}

management:
  endpoints.web.exposure.include: "*"
  endpoint.env.show-values: ALWAYS
  tracing:
    sampling.probability: 1.0
    enabled: true
  otlp.metrics.export.step: 5s

nutrition-planner:
  user-profiles:
    - name: alice
      dietary-restrictions:
        - vegetarian
      health-goals:
        - weight-loss
        - improve-energy
      daily-calorie-target: 1800
      allergies:
        - nuts
      disliked-ingredients:
        - cilantro
        - olives
