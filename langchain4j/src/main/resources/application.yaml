spring:
  application.name: langchain4j-nutrition-planner
  profiles.active: openai
  security.user:
    password: 123456
    name: alice

logging:
  level:
    com.nutritionplanner: DEBUG
    dev.langchain4j: DEBUG

management:
  endpoints.web.exposure.include: "*"
  endpoint.env.show-values: ALWAYS
  otlp.metrics.export.enabled: false

nutrition-planner:
  max-validation-iterations: 3
  user-profiles:
    - name: alice
      dietary-restrictions:
        - vegetarian
      health-goals:
        - weight-loss
        - improve-energy
      daily-calorie-target: 1800
      allergies:
        - nuts
      disliked-ingredients:
        - cilantro
        - olives
